<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arw" markerWidth="12" markerHeight="12" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="1900" fill="#fbfcfe"/>
  <text x="460" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1b2a4a">Vinyl Switch — How it works (live, cloud)</text>

  <!-- GitHub → Render (code deploy) : drawn in the freed top band -->
  <rect x="246" y="62" width="190" height="48" rx="10" fill="#24292f" stroke="#1b1f23" stroke-width="2"/>
  <text x="341" y="83" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">GitHub</text>
  <text x="341" y="100" text-anchor="middle" font-size="10" fill="#c9d1d9">code repository</text>
  <line x1="341" y1="110" x2="341" y2="160" stroke="#555" stroke-width="2.5" marker-end="url(#arw)"/>
  <text x="350" y="139" font-size="11" font-weight="700" fill="#3b6fb0">git push → auto-deploy</text>

  <!-- everything below is shifted down to make room for the GitHub block -->
  <g transform="translate(0,90)">

  <!-- ===================== ARCHITECTURE STRIP ===================== -->
  <text x="20" y="62" font-size="13" font-weight="700" fill="#6a5acd">ARCHITECTURE (everything dials OUT to the cloud)</text>

  <rect x="20"  y="74" width="180" height="62" rx="10" fill="#ececff" stroke="#6a5acd" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#27306b">Customer / Staff</text>
  <text x="110" y="118" text-anchor="middle" font-size="12" fill="#27306b">web browser</text>

  <rect x="246" y="74" width="190" height="62" rx="10" fill="#e8f1ff" stroke="#3b6fb0" stroke-width="2"/>
  <text x="341" y="98"  text-anchor="middle" font-size="13" font-weight="700" fill="#1b3a63">Render (cloud)</text>
  <text x="341" y="115" text-anchor="middle" font-size="11" fill="#1b3a63">web + API + DB</text>
  <text x="341" y="130" text-anchor="middle" font-size="10" fill="#1b3a63">vinyl-switch.onrender.com</text>

  <rect x="486" y="74" width="180" height="62" rx="10" fill="#fff3cd" stroke="#c8a415" stroke-width="2"/>
  <text x="576" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#6b550a">HiveMQ Cloud</text>
  <text x="576" y="118" text-anchor="middle" font-size="11" fill="#6b550a">MQTT broker · TLS 8883</text>

  <rect x="716" y="74" width="184" height="62" rx="10" fill="#d8f5e0" stroke="#2e9e54" stroke-width="2"/>
  <text x="808" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1c5e34">ESP32 (Booth B)</text>
  <text x="808" y="118" text-anchor="middle" font-size="11" fill="#1c5e34">relay / LED</text>

  <!-- arch arrows -->
  <line x1="200" y1="105" x2="244" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>
  <text x="222" y="98" text-anchor="middle" font-size="9" fill="#555">https</text>
  <line x1="436" y1="105" x2="484" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>
  <text x="460" y="98" text-anchor="middle" font-size="9" fill="#555">TLS</text>
  <line x1="716" y1="105" x2="668" y2="105" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>
  <text x="692" y="98" text-anchor="middle" font-size="9" fill="#555">TLS</text>

  <line x1="20" y1="156" x2="900" y2="156" stroke="#dfe3ea" stroke-width="1"/>

  <!-- ===================== PROCESS FLOW ===================== -->
  <text x="20" y="182" font-size="13" font-weight="700" fill="#3b6fb0">FLOW OF A SESSION</text>

  <!-- 1 start -->
  <rect x="300" y="196" width="320" height="46" rx="23" fill="#d8f5e0" stroke="#2e9e54" stroke-width="2"/>
  <text x="460" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#1c5e34">Customer opens the website</text>
  <line x1="460" y1="242" x2="460" y2="262" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>

  <!-- 2 -->
  <rect x="270" y="262" width="380" height="56" rx="10" fill="#e8f1ff" stroke="#3b6fb0" stroke-width="2"/>
  <text x="460" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#1b3a63">Books a 1-hour slot  →  gets a 6-digit code</text>
  <text x="460" y="304" text-anchor="middle" font-size="11" fill="#1b3a63">(Render saves the booking in its database)</text>
  <line x1="460" y1="318" x2="460" y2="338" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>

  <!-- 3 -->
  <rect x="270" y="338" width="380" height="48" rx="10" fill="#e8f1ff" stroke="#3b6fb0" stroke-width="2"/>
  <text x="460" y="367" text-anchor="middle" font-size="13" font-weight="600" fill="#1b3a63">Arrives at the machine, enters the code</text>
  <line x1="460" y1="386" x2="460" y2="406" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>

  <!-- decision 1 -->
  <polygon points="460,406 620,476 460,546 300,476" fill="#fff3cd" stroke="#c8a415" stroke-width="2"/>
  <text x="460" y="472" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b550a">Code valid &amp; within</text>
  <text x="460" y="489" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b550a">the time window?</text>

  <!-- no branch -->
  <line x1="620" y1="476" x2="700" y2="476" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>
  <text x="655" y="468" text-anchor="middle" font-size="11" font-weight="700" fill="#b23b3b">NO</text>
  <rect x="700" y="450" width="200" height="52" rx="10" fill="#fde8e8" stroke="#b23b3b" stroke-width="2"/>
  <text x="800" y="472" text-anchor="middle" font-size="12" fill="#7a2020">Show error</text>
  <text x="800" y="489" text-anchor="middle" font-size="10.5" fill="#7a2020">(too early / expired / taken)</text>

  <!-- yes down -->
  <text x="476" y="566" text-anchor="middle" font-size="11" font-weight="700" fill="#2e9e54">YES</text>
  <line x1="460" y1="546" x2="460" y2="582" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>

  <!-- 5 -->
  <rect x="270" y="582" width="380" height="56" rx="10" fill="#e8f1ff" stroke="#3b6fb0" stroke-width="2"/>
  <text x="460" y="605" text-anchor="middle" font-size="13" font-weight="600" fill="#1b3a63">Render publishes  ON {seconds}</text>
  <text x="460" y="624" text-anchor="middle" font-size="11" fill="#1b3a63">to HiveMQ  →  topic  machine/&lt;id&gt;/cmd</text>
  <line x1="460" y1="638" x2="460" y2="658" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>

  <!-- 6 -->
  <rect x="270" y="658" width="380" height="56" rx="10" fill="#d8f5e0" stroke="#2e9e54" stroke-width="2"/>
  <text x="460" y="681" text-anchor="middle" font-size="13" font-weight="600" fill="#1c5e34">ESP32 receives it  →  relay / LED ON</text>
  <text x="460" y="700" text-anchor="middle" font-size="11" fill="#1c5e34">starts local safety timer (auto-off backup)</text>
  <line x1="460" y1="714" x2="460" y2="734" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>

  <!-- 7 -->
  <rect x="270" y="734" width="380" height="56" rx="10" fill="#e8f1ff" stroke="#3b6fb0" stroke-width="2"/>
  <text x="460" y="757" text-anchor="middle" font-size="13" font-weight="600" fill="#1b3a63">ESP32 reports status  →  HiveMQ  →  Render</text>
  <text x="460" y="776" text-anchor="middle" font-size="11" fill="#1b3a63">dashboard shows  online / relay on</text>
  <line x1="460" y1="790" x2="460" y2="816" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>

  <!-- decision 2 -->
  <polygon points="460,816 620,884 460,952 300,884" fill="#fff3cd" stroke="#c8a415" stroke-width="2"/>
  <text x="460" y="880" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b550a">Time up?  (or</text>
  <text x="460" y="897" text-anchor="middle" font-size="12.5" font-weight="600" fill="#6b550a">admin Force-Off)</text>

  <!-- no loop back to step 7 -->
  <text x="250" y="876" text-anchor="middle" font-size="11" font-weight="700" fill="#b23b3b">NO</text>
  <polyline points="300,884 190,884 190,762 270,762" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>
  <text x="150" y="826" text-anchor="middle" font-size="10.5" fill="#555">running…</text>
  <text x="150" y="840" text-anchor="middle" font-size="10.5" fill="#555">(heartbeat)</text>

  <!-- yes down -->
  <text x="476" y="972" text-anchor="middle" font-size="11" font-weight="700" fill="#2e9e54">YES</text>
  <line x1="460" y1="952" x2="460" y2="982" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>

  <!-- 9 -->
  <rect x="270" y="982" width="380" height="56" rx="10" fill="#d8f5e0" stroke="#2e9e54" stroke-width="2"/>
  <text x="460" y="1005" text-anchor="middle" font-size="13" font-weight="600" fill="#1c5e34">Relay / LED OFF</text>
  <text x="460" y="1024" text-anchor="middle" font-size="11" fill="#1c5e34">server sends OFF  ·  or ESP32 safety timer</text>
  <line x1="460" y1="1038" x2="460" y2="1058" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>

  <!-- end -->
  <rect x="320" y="1058" width="280" height="44" rx="22" fill="#d8f5e0" stroke="#2e9e54" stroke-width="2"/>
  <text x="460" y="1085" text-anchor="middle" font-size="14" font-weight="700" fill="#1c5e34">Session complete</text>

  <!-- ===================== CONNECTION & DATA EXCHANGE ===================== -->
  <line x1="20" y1="1128" x2="900" y2="1128" stroke="#dfe3ea" stroke-width="1"/>
  <text x="460" y="1156" text-anchor="middle" font-size="17" font-weight="700" fill="#6a5acd">CONNECTION &amp; DATA EXCHANGE  (MQTT publish / subscribe)</text>
  <text x="460" y="1180" text-anchor="middle" font-size="12" fill="#444">Both dial OUT with the same login:  mqtt.connect( 0ce62721….hivemq.cloud : 8883 ,  user "Dineshv" ,  TLS )</text>

  <!-- Row 1: COMMAND  (server -> device) -->
  <text x="30" y="1216" font-size="13" font-weight="700" fill="#3b6fb0">① COMMAND  —  server tells the machine to switch ON / OFF</text>

  <rect x="30"  y="1228" width="150" height="52" rx="9" fill="#e8f1ff" stroke="#3b6fb0" stroke-width="2"/>
  <text x="105" y="1259" text-anchor="middle" font-size="13" font-weight="700" fill="#1b3a63">Render</text>

  <rect x="340" y="1228" width="150" height="52" rx="9" fill="#fff3cd" stroke="#c8a415" stroke-width="2"/>
  <text x="415" y="1252" text-anchor="middle" font-size="13" font-weight="700" fill="#6b550a">HiveMQ</text>
  <text x="415" y="1268" text-anchor="middle" font-size="10" fill="#6b550a">broker</text>

  <rect x="650" y="1228" width="150" height="52" rx="9" fill="#d8f5e0" stroke="#2e9e54" stroke-width="2"/>
  <text x="725" y="1259" text-anchor="middle" font-size="13" font-weight="700" fill="#1c5e34">ESP32</text>

  <line x1="180" y1="1254" x2="338" y2="1254" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>
  <text x="259" y="1246" text-anchor="middle" font-size="10.5" font-weight="600" fill="#333">publish → machine/&lt;id&gt;/cmd</text>
  <text x="259" y="1274" text-anchor="middle" font-size="10" fill="#666">{"action":"on","seconds":3600}</text>

  <line x1="490" y1="1254" x2="648" y2="1254" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>
  <text x="569" y="1246" text-anchor="middle" font-size="10.5" fill="#333">deliver</text>
  <text x="569" y="1274" text-anchor="middle" font-size="10" fill="#666">(ESP32 subscribed)</text>

  <text x="806" y="1258" font-size="11" font-weight="700" fill="#1c5e34">→ relay ON</text>

  <!-- Row 2: STATUS  (device -> server), arrows point left -->
  <text x="30" y="1340" font-size="13" font-weight="700" fill="#2e9e54">② STATUS  —  machine reports it's alive + relay state  (on connect + every 20s)</text>

  <rect x="30"  y="1352" width="150" height="52" rx="9" fill="#e8f1ff" stroke="#3b6fb0" stroke-width="2"/>
  <text x="105" y="1383" text-anchor="middle" font-size="13" font-weight="700" fill="#1b3a63">Render</text>

  <rect x="340" y="1352" width="150" height="52" rx="9" fill="#fff3cd" stroke="#c8a415" stroke-width="2"/>
  <text x="415" y="1383" text-anchor="middle" font-size="13" font-weight="700" fill="#6b550a">HiveMQ</text>

  <rect x="650" y="1352" width="150" height="52" rx="9" fill="#d8f5e0" stroke="#2e9e54" stroke-width="2"/>
  <text x="725" y="1383" text-anchor="middle" font-size="13" font-weight="700" fill="#1c5e34">ESP32</text>

  <line x1="648" y1="1378" x2="492" y2="1378" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>
  <text x="570" y="1370" text-anchor="middle" font-size="10.5" font-weight="600" fill="#333">publish → machine/&lt;id&gt;/status</text>
  <text x="570" y="1398" text-anchor="middle" font-size="10" fill="#666">{"online":true,"relay":"on"}</text>

  <line x1="338" y1="1378" x2="182" y2="1378" stroke="#555" stroke-width="2" marker-end="url(#arw)"/>
  <text x="260" y="1370" text-anchor="middle" font-size="10.5" fill="#333">deliver</text>
  <text x="260" y="1398" text-anchor="middle" font-size="10" fill="#666">(Render subscribed)</text>

  <text x="30" y="1426" font-size="11" font-weight="700" fill="#1b3a63">→ dashboard shows online / relay state</text>

  <!-- ===================== BOTH SIDES — SAME PATTERN ===================== -->
  <line x1="20" y1="1450" x2="900" y2="1450" stroke="#dfe3ea" stroke-width="1"/>
  <text x="460" y="1478" text-anchor="middle" font-size="17" font-weight="700" fill="#6a5acd">BOTH SIDES — SAME PATTERN  (the connection code)</text>

  <!-- header -->
  <rect x="30" y="1494" width="860" height="40" fill="#6a5acd"/>
  <text x="110" y="1519" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Aspect</text>
  <text x="365" y="1519" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">ESP32  (C++)</text>
  <text x="715" y="1519" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Render  (Node.js)</text>

  <!-- row shading -->
  <rect x="30" y="1534" width="860" height="46" fill="#ffffff"/>
  <rect x="30" y="1580" width="860" height="46" fill="#f3f4fb"/>
  <rect x="30" y="1626" width="860" height="46" fill="#ffffff"/>
  <rect x="30" y="1672" width="860" height="46" fill="#f3f4fb"/>
  <rect x="30" y="1718" width="860" height="46" fill="#ffffff"/>

  <text x="42"  y="1563" font-size="13" font-weight="700" fill="#27306b">Library</text>
  <text x="200" y="1563" font-size="12.5" font-family="Consolas, monospace" fill="#1b3a63">PubSubClient</text>
  <text x="550" y="1563" font-size="12.5" font-family="Consolas, monospace" fill="#1b3a63">mqtt</text>

  <text x="42"  y="1609" font-size="13" font-weight="700" fill="#27306b">Address</text>
  <text x="200" y="1609" font-size="12.5" font-family="Consolas, monospace" fill="#1b3a63">MQTT_HOST : 8883</text>
  <text x="550" y="1609" font-size="12.5" font-family="Consolas, monospace" fill="#1b3a63">mqtts://host : 8883</text>

  <text x="42"  y="1655" font-size="13" font-weight="700" fill="#27306b">Login</text>
  <text x="200" y="1655" font-size="12.5" font-family="Consolas, monospace" fill="#1b3a63">MQTT_USER / MQTT_PASS</text>
  <text x="550" y="1655" font-size="12.5" font-family="Consolas, monospace" fill="#1b3a63">username / password</text>

  <text x="42"  y="1701" font-size="13" font-weight="700" fill="#27306b">TLS (encrypt)</text>
  <text x="200" y="1701" font-size="12" font-family="Consolas, monospace" fill="#1b3a63">WiFiClientSecure + setInsecure()</text>
  <text x="550" y="1701" font-size="12" font-family="Consolas, monospace" fill="#1b3a63">mqtts://  (TLS scheme)</text>

  <text x="42"  y="1747" font-size="13" font-weight="700" fill="#27306b">Connect call</text>
  <text x="200" y="1747" font-size="12" font-family="Consolas, monospace" fill="#1b3a63">mqtt.connect(id, user, pass, …)</text>
  <text x="550" y="1747" font-size="12" font-family="Consolas, monospace" fill="#1b3a63">mqtt.connect(url, {user, pass})</text>

  <!-- grid -->
  <line x1="190" y1="1494" x2="190" y2="1764" stroke="#d7daea" stroke-width="1"/>
  <line x1="540" y1="1494" x2="540" y2="1764" stroke="#d7daea" stroke-width="1"/>
  <rect x="30" y="1494" width="860" height="270" fill="none" stroke="#b9bedf" stroke-width="1.5"/>

  <text x="460" y="1790" text-anchor="middle" font-size="11.5" fill="#444">Same idea, two languages → both dial OUT to HiveMQ:8883 (TLS) with the same login, then publish/subscribe the two topics above.</text>
  </g>
</svg>
